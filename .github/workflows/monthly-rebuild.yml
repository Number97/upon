name: Monthly site rebuild

# Refreshes the static snapshot of the public site so the baked-in data
# stays close to what's in the DB. The admin can also trigger this manually
# from the Actions tab via "workflow_dispatch".

on:
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC on the 1st of every month
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Netlify build hook
        run: |
          curl -fsS -X POST -d '{}' "${{ secrets.NETLIFY_BUILD_HOOK }}"
